<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORBIS Admin Command Center</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
        }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* 🟢 Top Navigation */
        .admin-nav { background: var(--bg-card); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; }
        .admin-nav h1 { margin: 0; font-size: 1.2rem; color: var(--accent-blue); letter-spacing: 1px; }
        .sys-status { font-size: 0.8rem; font-weight: bold; color: var(--accent-green); background: rgba(16, 185, 129, 0.1); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--accent-green); }

        /* 🟢 Main Dashboard Grid */
        .dashboard-container { padding: 20px; max-width: 1200px; margin: 0 auto; transition: all 0.3s ease; }
        .section-title { font-size: 1rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px dashed #334155; padding-bottom: 5px; }
        
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        
        .admin-card { background: var(--bg-card); border: 1px solid #334155; border-radius: 10px; padding: 20px 15px; text-align: center; cursor: pointer; transition: transform 0.2s, background 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 120px; }
        .admin-card:hover { transform: translateY(-5px); background: #253347; border-color: var(--accent-blue); }
        .card-icon { font-size: 2.5rem; margin-bottom: 10px; }
        .card-title { font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; }
        .card-status { font-size: 0.7rem; color: var(--accent-green); font-family: monospace; }

        /* 🟢 Detail Panel (Hidden by default) */
        .detail-panel-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 200; flex-direction: column; }
        .panel-header { background: var(--bg-card); padding: 10px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #334155; }
        .btn-back { background: transparent; border: 1px solid var(--text-muted); color: var(--text-main); padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-back:hover { background: #334155; }
        .panel-title { font-size: 1.1rem; font-weight: bold; color: var(--accent-blue); margin: 0; }
        
        .panel-content { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        
        /* Placeholder for injected content */
        .placeholder-box { border: 2px dashed #334155; border-radius: 8px; padding: 30px; text-align: center; color: var(--text-muted); font-family: monospace; margin-top: 20px; }

    </style>
</head>
<body>

    <header class="admin-nav">
        <h1>⚙️ ORBIS ADMIN</h1>
        <div class="sys-status">● ONLINE</div>
    </header>

    <div class="dashboard-container" id="main-dashboard">
        
        <div class="section-title">Core Testing & Diagnostics</div>
        <div class="card-grid">
            <div class="admin-card" onclick="openPanel('panel-chat', '💬 AI Sandbox (Test Interface)')">
                <div class="card-icon">💬</div>
                <div class="card-title">AI Sandbox</div>
                <div class="card-status">Active</div>
            </div>
            
            <div class="admin-card" onclick="openPanel('panel-logs', '📜 Central System Logs')">
                <div class="card-icon">📜</div>
                <div class="card-title">Live Logs</div>
                <div class="card-status" id="log-count">Monitoring...</div>
            </div>

            <div class="admin-card" onclick="openPanel('panel-tree', '🧬 Visual Dependency Tree')">
                <div class="card-icon">🧬</div>
                <div class="card-title">Logic Tree</div>
                <div class="card-status">Active</div>
            </div>

            <div class="admin-card" onclick="openPanel('panel-telemetry', '📊 Hardware & DB Telemetry')">
                <div class="card-icon">📊</div>
                <div class="card-title">Telemetry</div>
                <div class="card-status" style="color: var(--accent-orange)">Ping: 12ms</div>
            </div>
        </div>

        <div class="section-title">Platform Management</div>
        <div class="card-grid">
            <div class="admin-card" onclick="openPanel('panel-modules', '🧩 Module Publisher')">
                <div class="card-icon">🧩</div>
                <div class="card-title">Modules</div>
                <div class="card-status">3 Installed</div>
            </div>
            
            <div class="admin-card" style="border-color: var(--accent-red);" onclick="window.location.href='/'">
                <div class="card-icon">🚪</div>
                <div class="card-title" style="color: var(--accent-red);">Exit Admin</div>
                <div class="card-status" style="color: var(--text-muted);">Return to Public</div>
            </div>
        </div>
    </div>

    <div class="detail-panel-container" id="detail-panel">
        <div class="panel-header">
            <button class="btn-back" onclick="closePanel()">← Back</button>
            <h2 class="panel-title" id="panel-title-text">Panel Name</h2>
        </div>
        
        <div class="panel-content" id="panel-content-area">
            </div>
    </div>

    <script>
        // 🟢 Navigation Logic
        function openPanel(panelId, title) {
            // Hide Dashboard, Show Panel
            document.getElementById('main-dashboard').style.display = 'none';
            document.getElementById('detail-panel').style.display = 'flex';
            document.getElementById('panel-title-text').innerText = title;

            const contentArea = document.getElementById('panel-content-area');
            
            // 🟢 In the next phase, we will inject the actual Cockpit UI components here.
            // For now, setting up the placeholders to prove the architecture works.
            if (panelId === 'panel-chat') {
                contentArea.innerHTML = `<div class="placeholder-box">Chat Interface will be mounted here...</div>`;
            } else if (panelId === 'panel-logs') {
                contentArea.innerHTML = `<div class="placeholder-box">Terminal Logs will stream here...</div>`;
            } else if (panelId === 'panel-tree') {
                contentArea.innerHTML = `<div class="placeholder-box">Visual Node Tree will render here...</div>`;
            } else if (panelId === 'panel-telemetry') {
                contentArea.innerHTML = `<div class="placeholder-box">RAM, CPU, and DB Status will display here...</div>`;
            } else if (panelId === 'panel-modules') {
                contentArea.innerHTML = `<div class="placeholder-box">Module Enable/Disable Toggles will appear here...</div>`;
            }
        }

        function closePanel() {
            // Hide Panel, Show Dashboard
            document.getElementById('detail-panel').style.display = 'none';
            document.getElementById('main-dashboard').style.display = 'block';
            document.getElementById('panel-content-area').innerHTML = ''; // Clear memory
        }
    </script>
</body>
</html>

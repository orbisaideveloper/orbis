<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORBIS Master Command Center</title>
    <link rel="stylesheet" href="/css/admin.css?v={{APP_VERSION}}">
    <link rel="stylesheet" href="/css/style.css?v={{APP_VERSION}}">
    
    <style>
        #security-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: opacity 0.5s ease; }
        .lock-box { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .pin-input { font-size: 2rem; width: 180px; text-align: center; letter-spacing: 15px; background: transparent; border: none; border-bottom: 2px solid #FF9933; color: white; outline: none; margin: 20px 0; font-family: monospace; }
        .unlock-btn { background: #FF9933; color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        #admin-workspace { display: none; } 
        .isolated-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 16px; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05); padding: 24px; }
    </style>
</head>
<body>

    <div id="security-overlay">
        <div class="lock-box">
            <div style="font-size: 3rem; margin-bottom: 10px;">🛡️</div>
            <h2 style="margin: 0 0 5px 0; color: #f8fafc;">RESTRICTED AREA</h2>
            <input type="password" id="master-pin" class="pin-input" maxlength="4" placeholder="****" onkeydown="if(event.key === 'Enter') checkPIN()">
            <br>
            <button class="unlock-btn" onclick="checkPIN()">AUTHORIZE</button>
            <p id="pin-error" style="color: #ff4d4d; font-size: 0.85rem; margin-top: 15px; display: none;">Access Denied.</p>
        </div>
    </div>

    <div id="admin-workspace">
        <header class="admin-nav">
            <h1>ORBIS <span>MASTER ADMIN</span></h1>
            <div class="sys-status-badge"><div class="pulse-dot"></div>SYSTEM LIVE</div>
        </header>

        <div class="main-layout">
            <!-- Cockpit/Sidebar Section (Restored) -->
            <aside class="telemetry-sidebar cockpit-mode" id="dev-sidebar" style="width: 350px; display: flex; flex-direction: column; gap: 10px; padding: 10px;">
                <div class="panel-header">🚀 CORE DIAGNOSTICS</div>
                <div class="data-cell"><span class="data-label">RAM</span><span class="data-value" id="live-ram">-- MB</span></div>
                <div class="data-cell"><span class="data-label">Ping</span><span class="data-value" id="live-ping">-- ms</span></div>
                <div class="panel-header">📜 CENTRAL LOGS</div>
                <div class="terminal" id="log-box" style="height: 200px; background:#1e293b; color:#f8fafc; font-family:monospace; font-size:0.7rem; padding:6px; overflow-y: auto;"></div>
            </aside>

            <!-- Dashboard Content -->
            <div class="dashboard-container" id="main-dashboard" style="flex:1;">
                <div class="section-title">💼 Business Workspaces</div>
                <div class="card-grid">
                    <div class="isolated-card" id="card-digiledger" style="border-left: 4px solid #0052cc;">
                        <h3>📊 DigiLedger Workspace</h3>
                        <div id="digiledger-sub-menu">
                            <button class="sub-module-btn" onclick="window.EventBus.emit('NavigateTo', { target: 'lottery' })">🎟️ Lottery Dispatch</button>
                        </div>
                    </div>
                </div>
                <div id="dynamic-module-workspace" style="display: none; margin-top: 30px; padding: 20px; background: #fff; border-radius: 12px;"></div>
            </div>
        </div>
    </div> 

    <script>
        function checkPIN() {
            const pin = document.getElementById('master-pin').value;
            if(pin === '2026') { 
                document.getElementById('security-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('security-overlay').style.display = 'none';
                    document.getElementById('admin-workspace').style.display = 'block';
                }, 500);
            } else {
                document.getElementById('pin-error').style.display = 'block';
            }
        }
    </script>

    <!-- নতুন আর্কিটেকচারাল স্ক্রিপ্টস -->
    <script src="/js/module-registry.js?v={{APP_VERSION}}"></script>
    <script src="/js/module-loader.js?v={{APP_VERSION}}"></script>
    
    <!-- পুরাতন লজিক ফাইল -->
    <script src="/js/admin-logic.js?v={{APP_VERSION}}"></script>
    <script src="/js/admin-plugins.js?v={{APP_VERSION}}"></script>
</body>
</html>

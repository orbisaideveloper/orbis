<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBIS Diagnostics V3.6</title>
    <style>
        :root { --bg-dark: #0f111a; --bg-card: #1e2130; --text-main: #e0e6ed; --accent-blue: #3b82f6; --accent-green: #10b981; --accent-purple: #8b5cf6; }
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); }
        
        /* OVERFLOW & RESPONSIVE FIXES */
        * { box-sizing: border-box; }
        .table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; min-width: 800px; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #333; font-size: 13px; text-align: left; }
        pre, code { white-space: pre-wrap; word-wrap: break-word; overflow-x: hidden; font-family: monospace; }
        
        .search-section, .report-section, .data-card { background: var(--bg-card); padding: 20px; border-radius: 6px; margin-bottom: 20px; }
        .search-box { width: 100%; padding: 12px; background: #0f111a; border: 1px solid #333; color: white; border-radius: 4px; margin-bottom: 10px; }
        .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; font-size: 13px; margin: 2px; }
        .btn-blue { background: var(--accent-blue); } .btn-green { background: var(--accent-green); } .btn-purple { background: var(--accent-purple); }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; background: rgba(255,255,255,0.1); }
        
        /* DATA BLOCKS */
        .evidence-box, .fix-box, .inv-box { display: none; margin-top: 15px; padding: 15px; border: 1px dashed var(--accent-blue); background: #16192b; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="search-section">
        <h2 style="margin-top: 0; color: var(--accent-blue);">Developer Intent Engine</h2>
        <input type="text" id="search-input" class="search-box" placeholder="E.g., Analyze Dashboard, Run Audit, Check HTML">
    </div>

    <!-- EVIDENCE & FIX UI -->
    <div id="evidence-panel" class="evidence-box">
        <h3>📄 Evidence Pack <button class="btn btn-blue" onclick="copySection('evidence-content')">📋 Copy Evidence</button></h3>
        <pre id="evidence-content">Awaiting data...</pre>
    </div>
    
    <div id="fix-panel" class="fix-box">
        <h3>🛠️ Smart Fix Preview <button class="btn btn-purple" onclick="copySection('fix-content')">📋 Copy Fix</button></h3>
        <pre id="fix-content">Awaiting data...</pre>
    </div>

    <!-- MAIN REPORT -->
    <div class="report-section">
        <div style="display: flex; justify-content: space-between; flex-wrap: wrap;">
            <h3>Execution Trace</h3>
            <div>
                <!-- PHASE 4: NO DOWNLOADS, ONLY COPY BUTTONS -->
                <button class="btn btn-blue" onclick="copyFormat('json')">📋 Copy JSON</button>
                <button class="btn btn-purple" onclick="copyFormat('md')">📋 Copy Markdown</button>
                <button class="btn btn-green" onclick="copyFormat('trace')">📋 Copy Trace Table</button>
            </div>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>Stage</th><th>Status</th><th>File</th><th>Function</th><th>Impact</th><th>Fix</th></tr></thead>
                <tbody id="report-body"><tr><td colspan="6">Waiting for query...</td></tr></tbody>
            </table>
        </div>
    </div>
    <script src="diagnostics.js"></script>
</body>
</html>

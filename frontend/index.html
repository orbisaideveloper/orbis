<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORBIS Cockpit</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { position: fixed; top: 0; bottom: 0; left: 0; right: 0; width: 100%; height: 100%; overflow: hidden; background: #fdfdfd; -webkit-tap-highlight-color: transparent; }
        .dev-scroll::-webkit-scrollbar { width: 6px; }
        .dev-scroll::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        .pulse-mic { animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(255, 153, 51, 0.7); } 100% { box-shadow: 0 0 0 15px rgba(255, 153, 51, 0); } }
    </style>
</head>
<body class="bg-offwhite text-navy antialiased">
    <div x-data="orbisEngine()" x-init="init()" class="absolute inset-0 flex flex-col w-full h-full">
        
        <header class="h-14 bg-white border-b border-slate-200 flex justify-between items-center px-4 z-50 shadow-sm">
            <div class="font-bold flex items-center gap-3">
                <button @click="showTelemetry = true" class="md:hidden p-2 bg-slate-100 rounded text-navy"><i class="fa-solid fa-bars"></i></button>
                ORBIS Engine Cockpit
            </div>
            <div class="text-xs font-bold uppercase flex items-center gap-2">
                <span class="w-2.5 h-2.5 rounded-full" :class="isOnline ? 'bg-green' : 'bg-saffron'"></span>
                <span x-text="isOnline ? 'Online' : 'Connecting...'"></span>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden relative w-full">
            <aside :class="showTelemetry ? 'translate-x-0' : '-translate-x-full'" class="fixed md:relative z-40 transition-transform w-[340px] h-full bg-slate-50 border-r border-slate-200 flex flex-col p-4 gap-4 overflow-y-auto dev-scroll shadow-2xl md:shadow-none">
                <div class="flex justify-between md:hidden"><span class="font-bold">DEVELOPER TOOLS</span><button @click="showTelemetry = false"><i class="fa-solid fa-xmark"></i></button></div>
                
                <div class="bg-white border rounded-lg p-3 space-y-2 text-xs">
                    <p class="font-bold border-b pb-1">⚙️ CORE TELEMETRY</p>
                    <div class="grid grid-cols-2 gap-2">
                        <div>Ping: <span class="font-mono font-bold" x-text="telemetry.ping"></span></div>
                        <div>Uptime: <span class="font-mono font-bold" x-text="telemetry.uptime"></span></div>
                        <div>RAM: <span class="font-mono font-bold" x-text="telemetry.ram"></span></div>
                        <div>Requests: <span class="font-mono font-bold" x-text="telemetry.reqs"></span></div>
                    </div>
                </div>

                <div class="bg-white border rounded-lg p-3 space-y-2 text-xs">
                    <p class="font-bold border-b pb-1">🧩 ENGINE CONNECTORS</p>
                    <div class="space-y-1">
                        <div class="flex justify-between"><span>Gemini API</span> <span class="text-green-600 font-bold">ACTIVE</span></div>
                        <div class="flex justify-between"><span>Voice Module</span> <span class="text-green-600 font-bold">READY</span></div>
                        <div class="flex justify-between"><span>Storage Sync</span> <span class="text-green-600 font-bold">SYNCED</span></div>
                        <div class="flex justify-between"><span>UI State</span> <span class="text-green-600 font-bold">LOCKED</span></div>
                    </div>
                </div>

                <div class="flex-1 bg-navy text-green-400 font-mono text-[10px] p-3 rounded-lg overflow-y-auto dev-scroll">
                    <template x-for="log in logs">
                        <div class="mb-1"><span class="text-gray-500" x-text="log.time"></span> <span x-text="log.msg"></span></div>
                    </template>
                </div>
            </aside>

            <main class="flex-1 relative h-full bg-white">
                <div id="chat-box" class="absolute inset-0 bottom-20 overflow-y-auto p-4 space-y-4">
                    <template x-for="m in messages">
                        <div :class="m.role === 'user' ? 'bg-orange-100 ml-auto' : 'bg-green-100'" class="p-3 rounded-lg max-w-[80%] w-fit" x-text="m.text"></div>
                    </template>
                </div>
                <div class="absolute bottom-0 w-full h-20 bg-white border-t p-4 flex items-center">
                    <input class="flex-1 p-2 border rounded-lg outline-none" x-model="input" @keydown.enter="handleSend()" placeholder="Message..." />
                    <button class="ml-2 bg-green-600 text-white px-4 py-2 rounded-lg" @click="handleSend()">Send</button>
                </div>
            </main>
        </div>
    </div>

    <script>
        function orbisEngine() {
            return {
                telemetry: { ping: '20ms', uptime: '300s', ram: '18GB', reqs: '4', wf: 'IDLE' },
                logs: [{time: '12:00', msg: 'System Ready.'}],
                messages: [], input: '', isOnline: true, showTelemetry: false, isListening: false,
                init() { this.messages = JSON.parse(localStorage.getItem('orbis_chats') || '[]'); },
                async handleSend() {
                    if (!this.input.trim()) return;
                    this.messages.push({role: 'user', text: this.input});
                    const q = this.input; this.input = '';
                    try {
                        const res = await fetch('/api/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ prompt: q, history: this.messages }) });
                        const d = await res.json();
                        if (d.success) this.messages.push({role: 'ai', text: d.response});
                    } catch(e) { this.logs.push({time: 'NOW', msg: 'Error'}); }
                    localStorage.setItem('orbis_chats', JSON.stringify(this.messages));
                }
            }
        }
    </script>
</body>
</html>

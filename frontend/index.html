<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORBIS Advanced AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css"> 
</head>
<body>

    <div class="top-nav">
        <div class="nav-brand">✨ ORBIS AI</div>
        <div class="nav-status">
            <span id="tel-brainhub" class="status-dot offline"></span>
            <span id="tel-status-text">Connecting...</span>
        </div>
    </div>

    <div class="dashboard-wrapper">
        <div class="sidebar">
            <div class="panel">
                <div class="panel-header">⚙️ TELEMETRY MATRIX</div>
                <div class="status-box">Uptime: <span id="tel-uptime">--</span></div>
                <div class="status-box">Memory: <span id="tel-ram">-- MB</span></div>
                <div class="status-box">Ping: <span id="ping-status">-- ms</span></div>
                <div class="status-box">Workflow: <span id="tel-wf-status" class="text-blue">IDLE</span></div>
            </div>
            <div class="panel logs-panel">
                <div class="panel-header">📜 RUNTIME LOGS</div>
                <div class="logs-container" id="log-box"></div>
            </div>
        </div>

        <div class="main-chat-area">
            <div class="chat-container" id="chat-box">
                </div>
            
            <div class="input-section">
                <div class="gemini-input-wrapper">
                    <input type="file" id="file-input" style="display: none;">
                    <button class="icon-btn" onclick="document.getElementById('file-input').click()" title="Attach File">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                    
                    <input type="text" id="prompt-input" placeholder="Ask ORBIS anything..." autocomplete="off">
                    
                    <select id="lang-select" class="minimal-lang" title="Voice Language">
                        <option value="bn-IN">BN</option>
                        <option value="en-US">EN</option>
                    </select>
                    
                    <button class="icon-btn" id="mic-btn" onclick="startVoiceEngine()" title="Voice Input">
                        <i class="fa-solid fa-microphone"></i>
                    </button>
                    
                    <button class="gemini-send-btn" id="send-btn" onclick="executeSecureDispatch()">
                        <i class="fa-solid fa-arrow-up"></i>
                    </button>
                </div>
                <div class="input-footer">ORBIS Engine v1.3.5 | Advanced AI Model</div>
            </div>
        </div>
    </div>

    <script src="/app.js"></script> 
</body>
</html>

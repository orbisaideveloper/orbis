<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORBIS Core Engine</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: { extend: { colors: { saffron: '#FF9933', green: '#138808', navy: '#000080', offwhite: '#fdfdfd' } } }
        }
    </script>
    
    <style>
        /* 🚨 মোবাইল কিবোর্ড লক: এটি স্ক্রিনকে ১ পিক্সেলও নড়তে দেবে না 🚨 */
        html, body { 
            position: fixed; top: 0; bottom: 0; left: 0; right: 0;
            width: 100%; height: 100%; overflow: hidden; background: #fdfdfd; 
        }
    </style>
</head>
<body class="bg-offwhite text-navy antialiased">

    <div x-data="orbisEngine()" x-init="init()" class="absolute inset-0 flex flex-col overflow-hidden w-full h-full">
        
        <header class="flex-none h-14 bg-white border-b border-slate-200 border-t-4 border-t-saffron flex justify-between items-center px-4 z-50 shadow-sm select-none">
            <div class="font-extrabold text-lg flex items-center gap-2">
                <i class="fa-solid fa-microchip"></i> ORBIS Engine
            </div>
            <div class="text-xs font-bold flex items-center gap-2 uppercase tracking-wider">
                <span :class="isOnline ? 'bg-green shadow-[0_0_8px_#138808]' : 'bg-saffron shadow-[0_0_8px_#FF9933]'" class="w-2.5 h-2.5 rounded-full transition-all duration-300"></span>
                <span :class="isOnline ? 'text-green' : 'text-saffron'" x-text="isOnline ? 'System Online' : 'Connecting...'"></span>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden relative w-full">
            
            <aside class="hidden md:flex w-[340px] h-full bg-slate-50 border-r border-slate-200 flex-col p-4 gap-4 overflow-y-auto shrink-0 z-20">
                <div class="bg-white border border-slate-200 rounded-lg overflow-hidden shadow-sm shrink-0">
                    <div class="bg-slate-100 px-3 py-2 text-[0.7rem] font-bold border-b border-slate-200">⚙️ CORE TELEMETRY MATRIX</div>
                    <div class="grid grid-cols-2 gap-[1px] bg-slate-200">
                        <div class="bg-white p-3 flex flex-col gap-1"><span class="text-[0.65rem] font-bold uppercase opacity-70">API Ping</span><span class="font-mono font-bold" x-text="telemetry.ping"></span></div>
                        <div class="bg-white p-3 flex flex-col gap-1"><span class="text-[0.65rem] font-bold uppercase opacity-70">Uptime</span><span class="font-mono font-bold" x-text="telemetry.uptime"></span></div>
                        <div class="bg-white p-3 flex flex-col gap-1"><span class="text-[0.65rem] font-bold uppercase opacity-70">Memory</span><span class="font-mono font-bold" x-text="telemetry.ram"></span></div>
                        <div class="bg-white p-3 flex flex-col gap-1"><span class="text-[0.65rem] font-bold uppercase opacity-70">Requests</span><span class="font-mono font-bold" x-text="telemetry.reqs"></span></div>
                        <div class="bg-white p-3 flex flex-col gap-1 col-span-2"><span class="text-[0.65rem] font-bold uppercase opacity-70">Active Workflow</span><span class="font-mono font-bold" x-text="telemetry.wf"></span></div>
                    </div>
                </div>
                <div class="flex-1 bg-white border border-slate-200 rounded-lg overflow-hidden flex flex-col shadow-sm min-h-[180px]">
                    <div class="bg-slate-100 px-3 py-2 text-[0.7rem] font-bold border-b border-slate-200">📜 RUNTIME TERMINAL</div>
                    <div class="flex-1 bg-navy text-green font-mono text-xs p-3 overflow-y-auto" id="term-box">
                        <template x-for="log in logs">
                            <div class="mb-1">
                                <span class="text-gray-400" x-text="'['+log.time+']'"></span> 
                                <strong :class="log.type === 'OK' ? 'text-green' : log.type === 'ERR' ? 'text-saffron' : 'text-white'" x-text="' '+log.type"></strong>: <span x-text="log.msg"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </aside>

            <main class="absolute inset-0 md:left-[340px] bg-white flex flex-col overflow-hidden h-full">
                
                <div class="absolute top-0 left-0 right-0 bottom-[75px] overflow-y-auto p-4 md:p-6 flex flex-col gap-4 bg-white" id="chat-box">
                    <template x-if="messages.length === 0">
                        <div class="m-auto text-center opacity-50 flex flex-col items-center select-none">
                            <i class="fa-solid fa-satellite-dish text-4xl mb-3 text-navy"></i>
                            <p class="font-bold">ORBIS Core Engine Active.</p>
                        </div>
                    </template>
                    
                    <template x-for="m in messages">
                        <div :class="m.role === 'user' ? 'self-end bg-[#fff5ed] border border-saffron rounded-br-sm' : 'self-start bg-[#f0fdf4] border border-green rounded-bl-sm'" class="max-w-[85%] p-3 rounded-2xl text-[0.95rem] leading-relaxed shadow-sm">
                            <strong class="block mb-1 text-xs uppercase opacity-70" x-text="m.role === 'user' ? 'You' : 'ORBIS ✨'"></strong>
                            <div x-html="m.text.replace(/\n/g, '<br/>')"></div>
                        </div>
                    </template>

                    <template x-if="loading">
                        <div class="self-start max-w-[85%] p-3 rounded-2xl bg-[#f0fdf4] border border-green rounded-bl-sm flex items-center gap-2">
                            <span class="w-2 h-2 bg-green rounded-full animate-ping"></span> Synthesizing...
                        </div>
                    </template>
                </div>

                <div class="absolute bottom-0 left-0 right-0 h-[75px] bg-white border-t border-slate-200 flex items-center justify-center px-4">
                    <div class="flex items-center w-full max-w-4xl bg-slate-50 border border-slate-200 rounded-full px-2 py-1.5 focus-within:bg-white focus-within:border-green focus-within:shadow-[0_4px_12px_rgba(19,136,8,0.1)] transition-all">
                        <button class="w-10 h-10 rounded-full flex justify-center items-center opacity-60 hover:opacity-100"><i class="fa-solid fa-plus"></i></button>
                        <input 
                            type="text" 
                            className="flex-1 bg-transparent border-none outline-none px-2 text-[0.95rem]" 
                            placeholder="Message ORBIS..." 
                            x-model="input"
                            @keydown.enter="handleSend()"
                        />
                        <select class="bg-transparent font-bold text-xs outline-none cursor-pointer mx-2 hidden sm:block">
                            <option>BN</option>
                            <option>EN</option>
                        </select>
                        <button class="w-10 h-10 rounded-full flex justify-center items-center opacity-60 hover:opacity-100 mr-1"><i class="fa-solid fa-microphone"></i></button>
                        <button 
                            @click="handleSend()"
                            :disabled="loading || !input.trim()"
                            class="w-10 h-10 rounded-full bg-green text-white flex justify-center items-center hover:bg-[#0f6e06] disabled:bg-slate-300 disabled:opacity-50 transition-colors"
                        >
                            <i className="fa-solid fa-arrow-up"></i>
                        </button>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script>
        function orbisEngine() {
            return {
                telemetry: { ping: '--', uptime: '--', ram: '--', reqs: 0, wf: 'IDLE' },
                logs: [{ type: 'OK', msg: 'Alpine Core Framework Initialized.', time: new Date().toLocaleTimeString() }],
                messages: [],
                input: '',
                isOnline: false,
                loading: false,

                init() {
                    this.fetchTelemetry();
                    setInterval(() => this.fetchTelemetry(), 4000);
                },

                addLog(type, msg) {
                    this.logs.push({ type, msg, time: new Date().toLocaleTimeString() });
                    this.$nextTick(() => {
                        const tBox = document.getElementById('term-box');
                        if (tBox) tBox.scrollTop = tBox.scrollHeight;
                    });
                },

                async fetchTelemetry() {
                    try {
                        const res = await fetch('/api/telemetry');
                        const json = await res.json();
                        if (json.success) {
                            this.telemetry = {
                                ping: Math.floor(Math.random() * 40 + 20) + ' ms',
                                uptime: json.data.brainHub?.uptime + 's',
                                ram: json.data.memoryEngine?.ramUsageMB + ' MB',
                                reqs: json.data.performance?.totalRequests,
                                wf: json.data.brainHub?.activeWorkflow || 'IDLE'
                            };
                            this.isOnline = true;
                        }
                    } catch (e) {
                        this.isOnline = false;
                    }
                },

                async handleSend() {
                    if (!this.input.trim() || this.loading) return;
                    
                    const userMsg = this.input.trim();
                    this.input = '';
                    this.messages.push({ role: 'user', text: userMsg });
                    this.loading = true;
                    this.addLog('INFO', 'Forwarding packet payload to Gemini...');
                    
                    this.scrollToBottom();

                    try {
                        const start = Date.now();
                        const res = await fetch('/api/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ prompt: userMsg })
                        });
                        const data = await res.json();
                        const diff = Date.now() - start;

                        if (data.success) {
                            this.messages.push({ role: 'ai', text: data.response });
                            this.addLog('OK', `AI Synthesis successful in ${diff}ms`);
                            this.telemetry.ping = diff + ' ms';
                        } else {
                            this.addLog('ERR', 'Engine Fault: ' + data.error);
                        }
                    } catch (err) {
                        this.addLog('ERR', 'Transmission timeout.');
                    } finally {
                        this.loading = false;
                        this.scrollToBottom();
                    }
                },

                scrollToBottom() {
                    this.$nextTick(() => {
                        const cBox = document.getElementById('chat-box');
                        if (cBox) cBox.scrollTop = cBox.scrollHeight;
                    });
                }
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORBIS AI</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FF9933">
    
    <link rel="stylesheet" href="/css/style.css?v={{APP_VERSION}}">
    <link rel="stylesheet" href="/css/platform-ui.css?v={{APP_VERSION}}">
</head>
<body>

    <div id="pwa-install-banner" class="pwa-banner">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="background: #f8fafc; padding: 8px; border-radius: 8px; font-size: 1.5rem;">📱</div>
            <div>
                <strong style="color: #0f172a; font-size: 0.95rem; display: block;">Install ORBIS App</strong>
                <span style="color: #64748b; font-size: 0.8rem;">Fast, offline access to your workspace.</span>
            </div>
        </div>
        <div style="display: flex; gap: 8px;">
            <button onclick="hideInstallBanner()" style="background: transparent; border: 1px solid #cbd5e1; padding: 6px 12px; border-radius: 6px; color: #64748b; cursor: pointer; font-weight: bold; font-size: 0.8rem;">Later</button>
            <button id="pwa-install-btn" style="background: #FF9933; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem; box-shadow: 0 4px 6px rgba(255,153,51,0.3);">Install</button>
        </div>
    </div>

    <div id="orbis-platform-root" class="platform-layer"></div>

    <header class="top-nav" style="display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; gap: 10px;">
        <div class="brand" style="display: flex; align-items: center; gap: 8px; font-weight: 800; color: var(--navy-blue); white-space: nowrap;">
            <button onclick="toggleSidebar()" id="mobile-menu-btn" style="background:transparent; border:none; font-size:1.4rem; cursor:pointer; color:var(--navy-blue); padding-right:5px;">☰</button>
            <span>ORBIS AI</span>
        </div>
        <div class="sys-badges" style="display: flex; align-items: center; gap: 8px; flex-shrink: 0;">
            <button onclick="window.clearUserHistory()" class="btn-pill-clear">Clear Chat</button>
            <button onclick="window.clearContext ? window.clearContext() : location.reload()" class="btn-pill-action">Reset</button>
            <div class="live-container-mini">
                <span id="glow-dot" class="status-glow online" style="margin:0; width:6px; height:6px;"></span>
                <span id="status-text" style="color:#166534; font-size:0.65rem; font-weight:800;">LIVE</span>
            </div>
        </div>
    </header>

    <div class="main-layout">
        <div id="dashboard-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

        <!-- Diagnostic Cockpit Enabled -->
        <aside class="telemetry-sidebar cockpit-mode" id="dev-sidebar" style="width: 380px; display: flex; flex-direction: column; gap: 10px; padding: 15px; background: #0f172a; color: #fff; font-family: monospace;">
            <h3 style="color: #FF9933; margin-top:0;">Diagnostic Cockpit</h3>
            
            <div id="xray-err-trace" style="display:none; padding:10px; background:#fee2e2; color:#b91c1c; font-size:0.7rem; border-radius:4px;"></div>

            <div style="font-size: 0.8rem; line-height: 1.6;">
                <strong>RAM:</strong> <span id="sys-ram">-- MB</span><br>
                <strong>Ping:</strong> <span id="net-ping">-- ms</span><br>
                <strong>Latency:</strong> <span id="prov-gemini-latency">-- ms</span><br>
                <strong>Memory Nodes:</strong> <span id="mem-nodes">0</span><br>
                <strong>Last Route:</strong> <span id="router-last">None</span>
            </div>

            <div style="border-top:1px solid #334155; margin-top:10px; padding-top:10px;">
                <p><strong>System Status:</strong></p>
                <div style="display:flex; justify-content:space-between;"><span>Chat:</span> <span id="st-chat" class="xray-status">...</span></div>
                <div style="display:flex; justify-content:space-between;"><span>Voice:</span> <span id="st-voice" class="xray-status">...</span></div>
                <div style="display:flex; justify-content:space-between;"><span>DB:</span> <span id="st-supabase" class="xray-status">...</span></div>
                <div style="display:flex; justify-content:space-between;"><span>Router:</span> <span id="st-router" class="xray-status">...</span></div>
                <div style="display:flex; justify-content:space-between;"><span>Telemetry:</span> <span id="st-telemetry" class="xray-status">...</span></div>
            </div>
            <p style="font-size: 0.7rem; color: #64748b; margin-top: 20px;">Memory Status: <span id="mem-status">Checking...</span></p>
        </aside>

        <main class="chat-section">
            <div class="chat-display" id="chat-box"></div>
            <div class="input-dock">
                <div class="smart-input-box">
                    <select id="lang-select" class="lang-selector"><option value="bn-IN">BN</option></select>
                    <input type="text" id="prompt-box" placeholder="Message ORBIS..." onkeydown="if(event.key === 'Enter') window.dispatchToAI()" />
                    <button id="mic-btn" class="btn-icon" onclick="window.startVoiceEngine()">🎙️</button>
                    <button id="send-btn" class="btn-send" onclick="window.dispatchToAI()">➤</button>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/ui-core.js?v={{APP_VERSION}}"></script>
    <script src="/js/ui-dashboard.js?v={{APP_VERSION}}"></script>
    <script src="/js/ui-telemetry.js?v={{APP_VERSION}}"></script>
    <script src="/js/ui-chat.js?v={{APP_VERSION}}"></script>
    <script src="/js/ui-voice.js?v={{APP_VERSION}}"></script>
    
    <script src="/js/module-registry.js?v={{APP_VERSION}}"></script>
    <script src="/js/module-loader.js?v={{APP_VERSION}}"></script>

    <script src="/js/platform-core.js?v={{APP_VERSION}}"></script>
    <script src="/js/platform-init.js?v={{APP_VERSION}}"></script>

</body>
</html>

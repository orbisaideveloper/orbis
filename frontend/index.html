<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORBIS Core Engine</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="top-nav">
        <div class="brand">
            <button onclick="toggleSidebar()" class="mobile-menu-btn">☰</button>
            <span>ORBIS Engine</span>
        </div>
        <div class="sys-badges">
            <button onclick="clearContext()" style="background:none; border:1px solid var(--border); font-size:0.6rem; padding:2px 6px; cursor:pointer; color:var(--navy-blue); font-weight:bold; margin-right:10px;">CLEAR</button>
            <span id="glow-dot" class="status-glow online"></span>
            <span id="status-text" style="color:var(--saffron);">Online</span>
        </div>
    </header>

    <div class="main-layout">
        <aside class="telemetry-sidebar" id="dev-sidebar">
            <div style="text-align: right; margin-bottom: -10px;">
                <button onclick="toggleSidebar()" style="background:none; border:none; font-size:1.5rem; cursor:pointer; color:var(--saffron); font-weight:bold;">×</button>
            </div>
            <div class="panel">
                <div class="panel-header">⚙️ System Telemetry</div>
                <div class="data-grid">
                    <div class="data-cell"><span class="data-label">API Ping</span><span class="data-value" id="tel-ping">-- ms</span></div>
                    <div class="data-cell"><span class="data-label">Uptime</span><span class="data-value" id="tel-uptime">-- s</span></div>
                    <div class="data-cell"><span class="data-label">RAM Usage</span><span class="data-value" id="tel-ram">-- MB</span></div>
                    <div class="data-cell" style="grid-column: span 2;"><span class="data-label">Active Workflow</span><span class="data-value" id="tel-wf" style="font-size:0.7rem; background:#f3e8ff; padding:2px 6px; border-radius:4px; color:#7e22ce;">IDLE</span></div>
                </div>
            </div>
            <div class="panel" style="flex:1;">
                <div class="panel-header">📜 RUNTIME LOGS</div>
                <div class="terminal" id="log-box"></div>
            </div>
        </aside>

        <main class="chat-section">
            <div class="chat-display" id="chat-box"></div>
            <div class="input-dock">
                <div class="smart-input-box">
                    <select id="lang-select" class="lang-selector"><option value="bn-IN">BN</option></select>
                    <input type="text" id="prompt-box" placeholder="Message ORBIS..." onkeydown="if(event.key === 'Enter') window.dispatchToAI()" />
                    <button id="mic-btn" class="btn-icon" onclick="window.startVoiceEngine()">🎙️</button>
                    <button id="send-btn" class="btn-send" onclick="window.dispatchToAI()">➤</button>
                </div>
            </div>
        </main>
    </div>

    <script src="js/ui-core.js"></script>
    <script src="js/ui-events.js"></script>
    <script src="js/ui-api.js"></script>
    <script src="js/ui-router.js"></script>
    <script src="js/ui-storage.js"></script>
    <script src="js/ui-dashboard.js"></script>
    <script src="js/ui-telemetry.js"></script>
    <script src="js/ui-chat.js"></script>
    <script src="js/ui-voice.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORBIS Engineering Control Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f3f4f6;
            --panel-bg: #ffffff;
            --text-main: #1f2937;
            --saffron: #d97706;
            --green: #15803d;
            --border-color: #e5e7eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            padding: 10px;
            gap: 10px;
        }

        .dashboard-wrapper {
            display: flex;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            gap: 15px;
            flex-direction: row;
        }

        /* টেলিমেট্রি প্যানেল */
        .telemetry-panel {
            flex: 1;
            background-color: var(--panel-bg);
            border-radius: 8px;
            border-top: 4px solid var(--saffron);
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            min-width: 300px;
        }

        .panel-header {
            padding: 12px;
            background-color: #f8fafc;
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
            text-align: center;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 15px;
        }

        .status-box {
            background-color: #f8fafc;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-size: 0.85rem;
        }

        .status-box span { font-weight: bold; display: block; margin-top: 5px; }
        .text-green { color: var(--green); }
        .text-saffron { color: var(--saffron); }
        .text-gray { color: #6b7280; }

        .logs-container {
            flex: 1;
            background-color: #1e293b;
            color: #10b981;
            padding: 15px;
            font-size: 0.85rem;
            overflow-y: auto;
            border-top: 1px solid var(--border-color);
        }

        /* চ্যাট প্যানেল */
        .chat-panel {
            flex: 2;
            background-color: var(--panel-bg);
            border-radius: 8px;
            border-top: 4px solid var(--green);
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .chat-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 15px;
            border-radius: 8px;
            line-height: 1.5;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .msg-dev {
            align-self: flex-end;
            background-color: #fffbeb;
            border-right: 4px solid var(--saffron);
        }

        .msg-orbis {
            align-self: flex-start;
            background-color: #f0fdf4;
            border-left: 4px solid var(--green);
        }

        .input-area {
            padding: 10px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #f8fafc;
        }

        .icon-btn {
            background: none; border: none; font-size: 1.2rem;
            cursor: pointer; padding: 10px; border-radius: 5px;
            color: var(--text-main);
        }
        
        .recording { color: red !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* ল্যাঙ্গুয়েজ সিলেক্টর ড্রপডাউন */
        select.lang-select {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 5px;
            border-radius: 5px;
            outline: none;
            font-weight: bold;
            cursor: pointer;
        }

        input[type="text"] {
            flex: 1;
            min-width: 0;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            padding: 12px;
            border-radius: 6px;
        }

        #send-btn {
            background-color: var(--green); color: white;
            border: none; padding: 12px 18px; border-radius: 6px;
            font-weight: bold; cursor: pointer; white-space: nowrap;
        }
        #send-btn:disabled { background-color: gray; cursor: not-allowed; }
        #file-input { display: none; }

        @media (max-width: 768px) {
            .dashboard-wrapper { flex-direction: column; }
            .telemetry-panel { min-height: 280px; flex: none; }
            .chat-panel { flex: 1; }
        }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <!-- রিয়েল-টাইম টেলিমেট্রি প্যানেল -->
        <div class="telemetry-panel">
            <div class="panel-header">⚙️ System Telemetry</div>
            <div class="status-grid">
                <div class="status-box">BrainHub <span id="tel-brainhub" class="text-gray">FETCHING...</span></div>
                <div class="status-box">Provider <span id="tel-provider" class="text-gray">FETCHING...</span></div>
                <div class="status-box">Memory <span id="tel-memory" class="text-gray">FETCHING...</span></div>
                <div class="status-box">RAM Usage <span id="tel-ram" class="text-gray">-- MB</span></div>
                <div class="status-box">Uptime <span id="tel-uptime" class="text-gray">-- s</span></div>
                <div class="status-box">Ping <span id="ping-status" class="text-green">-- ms</span></div>
            </div>
            <div class="logs-container" id="log-box">
                > System Boot Sequence Initiated...<br>
                > Telemetry Link Established.<br>
            </div>
        </div>

        <!-- কন্ট্রোল সেন্টার ইন্টারফেস -->
        <div class="chat-panel">
            <div class="panel-header">🚀 ORBIS Dev Bridge</div>
            <div class="chat-area" id="chat-box"></div>

            <div class="input-area">
                <input type="file" id="file-input">
                <button class="icon-btn" id="file-btn" onclick="document.getElementById('file-input').click()" style="color: var(--saffron);">
                    <i class="fa-solid fa-paperclip"></i>
                </button>
                
                <input type="text" id="prompt-input" placeholder="Enter prompt..." autocomplete="off">
                
                <!-- ডাইনামিক ল্যাঙ্গুয়েজ সিলেক্টর -->
                <select id="lang-select" class="lang-select">
                    <option value="en-US">EN</option>
                    <option value="bn-IN">BN</option>
                    <option value="hi-IN">HI</option>
                </select>

                <button class="icon-btn" id="mic-btn" onclick="startVoice()">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                <button id="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const promptInput = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const logBox = document.getElementById('log-box');
        const pingStatus = document.getElementById('ping-status');
        const langSelect = document.getElementById('lang-select');

        // ==========================================
        // 🔄 REAL-TIME TELEMETRY SYSTEM
        // ==========================================
        async function fetchTelemetry() {
            try {
                const res = await fetch('/api/telemetry');
                const json = await res.json();
                if (json.success) {
                    const data = json.data;
                    document.getElementById('tel-brainhub').innerText = data.brainHub.status;
                    document.getElementById('tel-brainhub').className = "text-green";
                    
                    document.getElementById('tel-provider').innerText = data.provider.model;
                    document.getElementById('tel-provider').className = "text-saffron";
                    
                    document.getElementById('tel-memory').innerText = data.memoryEngine.status;
                    document.getElementById('tel-memory').className = "text-saffron";
                    
                    document.getElementById('tel-ram').innerText = data.memoryEngine.ramUsageMB + ' MB';
                    document.getElementById('tel-ram').className = "text-green";

                    document.getElementById('tel-uptime').innerText = data.brainHub.uptime + 's';
                    document.getElementById('tel-uptime').className = "text-green";
                }
            } catch (error) {
                document.getElementById('tel-brainhub').innerText = "OFFLINE";
                document.getElementById('tel-brainhub').className = "text-gray";
            }
        }
        
        // প্রতি ৫ সেকেন্ড পর পর সার্ভার থেকে আসল ডেটা টানবে
        setInterval(fetchTelemetry, 5000);
        fetchTelemetry(); // পেজ লোড হওয়ার সাথে সাথে একবার কল

        // ==========================================
        // 💬 CHAT & LOGGING SYSTEM
        // ==========================================
        function addLog(message) {
            const time = new Date().toLocaleTimeString();
            logBox.innerHTML += `> [${time}] ${message}<br>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function appendMessage(sender, text, className) {
            const formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            chatBox.innerHTML += `<div class="message ${className}"><strong>${sender}:</strong> ${formattedText}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = promptInput.value.trim();
            if (!text) return;

            appendMessage('Dev', text, 'msg-dev');
            promptInput.value = '';
            
            sendBtn.disabled = true;
            sendBtn.innerText = 'Wait...';
            addLog(`Requesting BrainHub...`);
            
            const startTime = Date.now();

            try {
                const response = await fetch('/api/chat', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });
                
                const data = await response.json();
                const timeTaken = Date.now() - startTime;
                
                pingStatus.innerText = `${timeTaken} ms`;
                addLog(`Response in ${timeTaken}ms.`);

                if (data.success) {
                    appendMessage('ORBIS', data.response, 'msg-orbis');
                } else {
                    appendMessage('System', 'Error processing response.', 'msg-orbis');
                }
            } catch (error) {
                appendMessage('System', 'Connection Error.', 'msg-orbis');
                addLog(`CRITICAL: Server unreachable.`);
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = 'Send';
            }
        }

        promptInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

        // ==========================================
        // 🎤 MULTI-LANGUAGE VOICE INPUT
        // ==========================================
        function startVoice() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Voice not supported in this browser.");
            
            const recognition = new SpeechRecognition();
            const micBtn = document.getElementById('mic-btn');
            
            // সিলেক্ট করা ভাষা অনুযায়ী মাইক কাজ করবে
            recognition.lang = langSelect.value; 
            
            recognition.onstart = () => {
                micBtn.classList.add('recording');
                addLog(`Voice input started (${langSelect.value})...`);
            };
            
            recognition.onresult = (e) => {
                promptInput.value = e.results[0][0].transcript;
                addLog(`Voice transcribed successfully.`);
            };
            
            recognition.onend = () => micBtn.classList.remove('recording');
            recognition.onerror = (e) => {
                micBtn.classList.remove('recording');
                addLog(`Voice Error: ${e.error}`);
            };
            
            recognition.start();
        }

        setTimeout(() => {
            appendMessage('ORBIS', 'System Ready. Awaiting developer input...', 'msg-orbis');
        }, 500);
    </script>
</body>
</html>

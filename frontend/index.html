<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORBIS AI</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FF9933">
    
    <!-- CSS Files (Version 1.0.01) -->
    <link rel="stylesheet" href="/css/style.css?v=1.0.01">
    <link rel="stylesheet" href="/css/platform-ui.css?v=1.0.01">

    <!-- 🚨 Global Error Catcher (Diagnostic Tool) 🚨 -->
    <script>
        "use strict";
        
        window.onerror = function(message, source, lineno, colno, error) {
            const errorDiv = document.createElement('div');
            errorDiv.style.cssText = "position:fixed; top:0; left:0; width:100%; background:#dc3545; color:white; padding:20px; z-index:9999; font-weight:bold; box-shadow:0 4px 6px rgba(0,0,0,0.3);";
            errorDiv.innerHTML = `🚨 ORBIS System Error Detected!<br><br>
                                  <b>Message:</b> ${message}<br>
                                  <b>File:</b> ${source}<br>
                                  <b>Line:</b> ${lineno}`;
            document.body.appendChild(errorDiv);
            return false;
        };
    </script>
</head>
<body>

    <div id="pwa-install-banner" class="pwa-banner">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="background: #f8fafc; padding: 8px; border-radius: 8px; font-size: 1.5rem;">📱</div>
            <div>
                <strong style="color: #0f172a; font-size: 0.95rem; display: block;">Install ORBIS App</strong>
                <span style="color: #64748b; font-size: 0.8rem;">Fast, offline access to your workspace.</span>
            </div>
        </div>
        <div style="display: flex; gap: 8px;">
            <button onclick="hideInstallBanner()" style="background: transparent; border: 1px solid #cbd5e1; padding: 6px 12px; border-radius: 6px; color: #64748b; cursor: pointer; font-weight: bold; font-size: 0.8rem;">Later</button>
            <button id="pwa-install-btn" style="background: #FF9933; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem; box-shadow: 0 4px 6px rgba(255,153,51,0.3);">Install</button>
        </div>
    </div>

    <div id="orbis-platform-root" class="platform-layer"></div>

    <header class="top-nav" style="display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; gap: 10px;">
        <div class="brand" style="display: flex; align-items: center; gap: 8px; font-weight: 800; color: var(--navy-blue); white-space: nowrap;">
            <span>ORBIS AI</span>
        </div>
        <div class="sys-badges" style="display: flex; align-items: center; gap: 8px; flex-shrink: 0;">
            <button onclick="window.clearUserHistory()" class="btn-pill-clear">Clear Chat</button>
            <button onclick="window.clearContext ? window.clearContext() : location.reload()" class="btn-pill-action">Reset</button>
            <div class="live-container-mini">
                <span id="glow-dot" class="status-glow online" style="margin:0; width:6px; height:6px;"></span>
                <span id="status-text" style="color:#166534; font-size:0.65rem; font-weight:800;">LIVE</span>
            </div>
        </div>
    </header>

    <div class="main-layout">
        <main class="chat-section">
            <div class="chat-display" id="chat-box"></div>
            <div class="input-dock">
                <div class="smart-input-box">
                    <select id="lang-select" class="lang-selector" aria-label="Select language"><option value="bn-IN">BN</option></select>
                    <input type="text" id="prompt-box" aria-label="Message ORBIS" placeholder="Message ORBIS..." onkeydown="if(event.key === 'Enter') window.dispatchToAI()" />
                    <button id="mic-btn" class="btn-icon" aria-label="Start voice input" onclick="window.startVoiceEngine()">🎙️</button>
                    <button id="send-btn" class="btn-send" aria-label="Send message" onclick="window.dispatchToAI()">➤</button>
                </div>
            </div>
        </main>
    </div>

    <!-- JS Core Files (Version 1.0.01) -->
    
    <!-- 🟢 Supabase Client & Global Database Service -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/database-service.js"></script>

    <script src="/js/ui-core.js?v=1.0.01"></script>
    <script src="/js/ui-dashboard.js?v=1.0.01"></script>
    <script src="/js/ui-telemetry.js?v=1.0.01"></script>
    <script src="/js/ui-chat.js?v=1.0.01"></script>
    <script src="/js/ui-voice.js?v=1.0.01"></script>
    
    <script src="/js/module-registry.js?v=1.0.01"></script>
    <script src="/js/module-loader.js?v=1.0.01"></script>

    <script src="/js/platform-core.js?v=1.0.01"></script>
    <script src="/js/platform-init.js?v=1.0.01"></script>

</body>
</html>

name: ORBIS Brain CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # এখান থেকে cache: 'npm' লাইনটি সরিয়ে দেওয়া হয়েছে যাতে আর লক ফাইল না খোঁজে
      
      - name: Install dependencies
        run: npm install

      - name: Run Jest Tests
        run: npm test
        env:
          NODE_OPTIONS: --experimental-vm-modules

      - name: ORBIS Live Architecture Output
        run: node src/run.js

      - name: SonarQube Scan
        if: github.actor != 'dependabot[bot]'
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=orbis
            -Dsonar.organization=orbis

name: ORBIS Brain CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      # 🚀 নতুন: HTML Validator (ট্যাগ বা স্ট্রাকচারে ভুল আছে কিনা চেক করবে)
      - name: HTML Syntax Checker
        run: npx htmlhint "**/*.html"

      # 🚀 নতুন: ESLint (জাভাস্ক্রিপ্টের সাইলেন্ট ফেইলর ও লজিক্যাল ভুল ধরবে)
      - name: Run ESLint
        run: npx eslint . --ext .js

      - name: Run Jest Tests
        run: npm test
        env:
          NODE_OPTIONS: --experimental-vm-modules

      - name: ORBIS Live Architecture Output
        run: node src/run.js

      - name: SonarCloud Scan
        if: github.actor != 'dependabot[bot]'
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=orbisaideveloper_orbis
            -Dsonar.organization=orbis

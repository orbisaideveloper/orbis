name: ORBIS Brain CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Run Tests & Collect Coverage
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js --coverage
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@0c4d7e3b9760920401490214300345037d45c363 # বর্তমান ভার্সনের SHA হ্যাশ

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=orbis
            -Dsonar.organization=orbis
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
